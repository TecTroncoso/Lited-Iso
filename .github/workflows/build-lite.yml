name: Build Lite Windows ISO

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (e.g. 22631.3593.PRO.X64.ES or "latest" to auto-detect)'
        default: 'latest'
        required: false
      build_type:
        description: 'Build Type (Core = Limpieza extrema, Lite = Segura)'
        default: 'Core'
        type: choice
        options:
          - 'Core'
          - 'Lite'
        required: true
      image_index:
        description: 'Windows image index (1=Home, 4=Education, 6=Pro, 7=Pro N)'
        default: '6'
        type: choice
        options:
          - '1'
          - '4'
          - '6'
          - '7'
        required: true
      architecture:
        description: 'Architecture (used for naming)'
        type: choice
        options: [x64, arm64]
        default: x64
        required: true
      language:
        description: 'Language code (e.g. ES, EN)'
        default: 'ES'
        required: true
      enable_dotnet35:
        description: 'Habilitar .NET 3.5 en la ISO'
        type: boolean
        default: false
        required: false
      remove_winre:
        description: 'Remover Windows Recovery Environment (WinRE)'
        type: boolean
        default: false
        required: false
      remove_defender:
        description: '[PELIGROSO] Remover Windows Defender'
        type: boolean
        default: false
        required: false
      disable_windows_update:
        description: '[PELIGROSO] Deshabilitar Windows Update de forma permanente'
        type: boolean
        default: false
        required: false
      export_esd:
        description: 'Exportar imagen final como ESD (Reduce mucho el tamaño)'
        type: boolean
        default: true
        required: false

jobs:
  build-lite:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Liberar espacio en el servidor
        shell: pwsh
        run: |
          Write-Host "Borrando software inútil del servidor para hacer espacio..."
          Remove-Item -Path "C:\Android" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\hostedtoolcache\windows\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\ProgramData\Docker" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Determine Release Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $inputTag = "${{ inputs.release_tag }}"
          if ([string]::IsNullOrWhiteSpace($inputTag) -or $inputTag -eq "latest") {
            Write-Host "Fetching latest releases from TecTroncoso/uup-dump-build-windows-iso..."
            $releases = gh api repos/TecTroncoso/uup-dump-build-windows-iso/releases | ConvertFrom-Json
            
            $win11Release = $releases | Where-Object { 
              $_.name -notmatch "Windows 10" -and 
              $_.tag_name -notmatch "^1904" 
            } | Select-Object -First 1

            if ($win11Release) {
              $selectedTag = $win11Release.tag_name
              Write-Host "Found latest Windows 11 release: $selectedTag"
              Add-Content -Path $env:GITHUB_ENV -Value "ACTUAL_RELEASE_TAG=$selectedTag"
            } else {
              Write-Error "No Windows 11 releases found in the repository."
              exit 1
            }
          } else {
            Write-Host "Using provided release tag: $inputTag"
            Add-Content -Path $env:GITHUB_ENV -Value "ACTUAL_RELEASE_TAG=$inputTag"
          }

      - name: Setup workspace variables
        shell: pwsh
        run: |
          $buildType = "${{ inputs.build_type }}"
          $isoName = "${buildType}11-$env:ACTUAL_RELEASE_TAG"
          Add-Content -Path $env:GITHUB_ENV -Value "ISO_NAME=$isoName"
          Add-Content -Path $env:GITHUB_ENV -Value "RELEASE_TAG=${buildType}-$env:ACTUAL_RELEASE_TAG"

      - name: Descargar partes de la ISO original
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          mkdir iso-parts
          cd iso-parts
          Write-Host "Descargando release $env:ACTUAL_RELEASE_TAG desde TecTroncoso/uup-dump-build-windows-iso"
          gh release download $env:ACTUAL_RELEASE_TAG --repo TecTroncoso/uup-dump-build-windows-iso --pattern "*.zip.*"
          
          $files = Get-ChildItem -Filter "*.zip.*"
          if ($files.Count -eq 0) {
            Write-Error "No se encontraron archivos .zip.* en la release especificada."
            exit 1
          }
          Write-Host "Archivos descargados:"
          $files | Select-Object Name, Length | Format-Table

      - name: Extraer ISO original
        shell: pwsh
        run: |
          cd iso-parts
          $firstPart = Get-ChildItem -Filter "*.zip.001" | Select-Object -First 1
          if (-not $firstPart) {
            Write-Error "No se encontró el archivo .zip.001 inicial."
            exit 1
          }
          Write-Host "Extrayendo $($firstPart.Name) con 7z..."
          7z x $firstPart.FullName -o"../extracted" -y -bsp1 -bso0
          
          $isoFile = Get-ChildItem -Path "../extracted" -Filter "*.ISO" | Select-Object -First 1
          if (-not $isoFile) {
            Write-Error "No se encontró el archivo .ISO después de la extracción."
            exit 1
          }
          
          Move-Item -Path $isoFile.FullName -Destination "../Win11_Source.iso" -Force
          Write-Host "ISO extraída en ../Win11_Source.iso"

      - name: Montar ISO
        shell: pwsh
        run: |
          $isoPath = Join-Path $PWD "Win11_Source.iso"
          Write-Host "Montando ISO: $isoPath"
          $mount = Mount-DiskImage -ImagePath $isoPath -PassThru -StorageType ISO
          Start-Sleep -Seconds 3
          $driveLetter = ($mount | Get-Volume).DriveLetter
          
          if (-not $driveLetter) {
            Write-Error "No se pudo montar la ISO o obtener la letra de la unidad."
            exit 1
          }
          Write-Host "ISO montada en la unidad: ${driveLetter}:"
          Add-Content -Path $env:GITHUB_ENV -Value "ISO_DRIVE=$driveLetter"

      - name: Ejecutar Tiny11Maker (Headless)
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          Write-Host "=== Iniciando Tiny11 Builder ==="
          Write-Host "ISO Drive: $($env:ISO_DRIVE)"
          Write-Host "Image Index: ${{ inputs.image_index }}"
          
          if (-not (Test-Path "scripts\tiny11maker-headless.ps1")) { Write-Error "tiny11maker-headless.ps1 no encontrado"; exit 1 }
          if (-not (Test-Path "scripts\autounattend.xml")) { Write-Error "autounattend.xml no encontrado"; exit 1 }

          $scriptArgs = @{
            ISO = "$env:ISO_DRIVE"
            INDEX = [int]"${{ inputs.image_index }}"
          }
          
          if ("${{ inputs.enable_dotnet35 }}" -eq "true") { $scriptArgs.EnableDotNet35 = $true }
          if ("${{ inputs.remove_winre }}" -eq "true") { $scriptArgs.RemoveWinRE = $true }
          if ("${{ inputs.remove_defender }}" -eq "true") { $scriptArgs.RemoveDefender = $true }
          if ("${{ inputs.disable_windows_update }}" -eq "true") { $scriptArgs.DisableWindowsUpdate = $true }
          if ("${{ inputs.export_esd }}" -eq "true") { $scriptArgs.ExportAsESD = $true }
          if ("${{ inputs.build_type }}" -eq "Core") { $scriptArgs.ExtremeWinSxSTrim = $true }

          $startTime = Get-Date
          & .\scripts\tiny11maker-headless.ps1 @scriptArgs
          $buildTime = (Get-Date) - $startTime
          Write-Host "Modificación completada en $($buildTime.TotalMinutes.ToString('F2')) minutos"

      - name: Verificar ISO modificada y preparar archivos
        shell: pwsh
        run: |
          $tempIso = ".\scripts\tiny11.iso"
          if (-not (Test-Path $tempIso)) {
            Write-Error "¡$tempIso no fue creada!"
            exit 1
          }
          
          Move-Item -Path $tempIso -Destination "$($env:ISO_NAME).iso" -Force
          $sizeGB = [math]::Round((Get-Item "$($env:ISO_NAME).iso").Length / 1GB, 2)
          Write-Host "$($env:ISO_NAME).iso creada exitosamente: ${sizeGB}GB"
          
          # Desmontar imagen fuente original para limpiar memoria (Error Ignorado si ya se desmontó)
          $isoPath = "$env:GITHUB_WORKSPACE\Win11_Source.iso"
          if (Test-Path $isoPath) {
              $mountedImage = Get-DiskImage -ImagePath $isoPath -ErrorAction SilentlyContinue
              if ($mountedImage -and $mountedImage.Attached) {
                  Dismount-DiskImage -ImagePath $isoPath -ErrorAction SilentlyContinue
              }
          }
          Remove-Item "Win11_Source.iso" -Force -ErrorAction SilentlyContinue
          Remove-Item "iso-parts" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "extracted" -Recurse -Force -ErrorAction SilentlyContinue

          # Checksums
          $sha256 = (Get-FileHash -Path "$($env:ISO_NAME).iso" -Algorithm SHA256).Hash
          $md5 = (Get-FileHash -Path "$($env:ISO_NAME).iso" -Algorithm MD5).Hash
          Add-Content -Path $env:GITHUB_ENV -Value "ISO_SHA256=$sha256"
          Add-Content -Path $env:GITHUB_ENV -Value "ISO_MD5=$md5"
          Add-Content -Path $env:GITHUB_ENV -Value "ISO_SIZE_GB=$sizeGB"

      - name: Dividir ISO en partes .zip (Para GitHub Releases)
        shell: pwsh
        run: |
          mkdir output_zip
          Write-Host "Dividiendo $($env:ISO_NAME).iso en partes de 1950MB..."
          7z a -tzip -mx=0 -v1950M -bsp2 "output_zip/$($env:ISO_NAME).zip" "$($env:ISO_NAME).iso"
          Get-ChildItem "output_zip/$($env:ISO_NAME).zip.*" | Sort-Object Name | ForEach-Object { Write-Host "Creado: $($_.FullName)" }

      - name: Subir a SourceForge
        shell: pwsh
        env:
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PROJECT: ${{ secrets.SF_PROJECT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SF_SSH_KEY) -or [string]::IsNullOrWhiteSpace($env:SF_USERNAME)) {
            Write-Host "Credenciales de SourceForge no configuradas. Se omitirá la subida a SourceForge."
            exit 0
          }
          
          $sfProject = $env:SF_PROJECT
          if ([string]::IsNullOrWhiteSpace($sfProject)) { $sfProject = "lite-iso" }
          
          $sshDir = "$env:USERPROFILE\.ssh"
          if (!(Test-Path $sshDir)) { New-Item -ItemType Directory -Force -Path $sshDir | Out-Null }
          $keyPath = "$sshDir\sf_key"
          
          try {
            $keyBytes = [System.Convert]::FromBase64String($env:SF_SSH_KEY)
            [System.IO.File]::WriteAllBytes($keyPath, $keyBytes)
          } catch {
            Write-Error "Fallo al decodificar SF_SSH_KEY. ¿Está codificado en Base64?"
            exit 1
          }
          
          icacls $keyPath /c /t /inheritance:d
          icacls $keyPath /c /t /grant "${env:USERNAME}:F"
          icacls $keyPath /c /t /remove Administrator "Authenticated Users" BUILTIN\Administrators BUILTIN\Users
          ssh-keyscan -t rsa,ecdsa,ed25519 frs.sourceforge.net | Out-File -FilePath "$sshDir\known_hosts" -Encoding ascii
          
          mkdir upload_folder
          Copy-Item "$($env:ISO_NAME).iso" upload_folder\
          
          $remoteRoot = "$env:SF_USERNAME@frs.sourceforge.net:/home/frs/project/$sfProject/"
          Write-Host "Subiendo archivo a SourceForge..."
          scp -i $keyPath -r -o StrictHostKeyChecking=no upload_folder $remoteRoot
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Subida por SCP fallida"
            exit 1
          }
          
          Write-Host "¡Subida exitosa a SourceForge!"
          $downloadUrl = "https://sourceforge.net/projects/$sfProject/files/upload_folder/$($env:ISO_NAME).iso/download"
          Add-Content -Path $env:GITHUB_ENV -Value "SF_DOWNLOAD_URL=$downloadUrl"
          Remove-Item $keyPath -Force -ErrorAction SilentlyContinue

      - name: Generar changelog
        shell: pwsh
        run: |
          $changelog = @"
          ## 🚀 Windows 11 Lite - $($env:RELEASE_TAG)

          **Construcción automatizada a partir de Iso-Builder**

          ### 💿 Detalles de Imagen
          | Propiedad | Valor |
          |----------|-------|
          | **Archivo** | $($env:ISO_NAME).iso |
          | **Tamaño** | $($env:ISO_SIZE_GB)GB |
          | **Arquitectura** | ${{ inputs.architecture }} |
          | **Índice (Edición)** | ${{ inputs.image_index }} |
          | **Idioma** | ${{ inputs.language }} |

          ### 📥 Descarga
          ${{ env.SF_DOWNLOAD_URL != '' && format('**SourceForge:** [{0}]({1})', env.ISO_NAME, env.SF_DOWNLOAD_URL) || '**Nota:** Descarga los archivos .zip divididos directamente de esta release o usa los scripts de auto-descarga (isoautodl).' }}

          ### 🔒 Checksums
          **SHA256:**
          \`\`\`
          $($env:ISO_SHA256)
          \`\`\`
          **MD5:**
          \`\`\`
          $($env:ISO_MD5)
          \`\`\`

          ### ❌ Eliminado
          - Bloatware general, Clipchamp, Edge, OneDrive, Xbox
          - Telemetría de Windows y tracking

          ### ✅ Añadido / Modificado
          - Bypass de TPM 2.0 y Secure Boot
          - Permite Cuenta Local por defecto
          - Optimizado para ocupar menos espacio y RAM
          "@
          $changelog | Out-File -FilePath release_notes.md -Encoding utf8

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.ISO_NAME }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            output_zip/*.zip.*

      - name: Generate platform packages (isoautodl)
        if: ${{ success() }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $tag = "${{ env.RELEASE_TAG }}"
          $owner,$repo = $env:GITHUB_REPOSITORY.Split('/')

          $ws   = $env:GITHUB_WORKSPACE
          $dist = Join-Path $ws "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $localParts = Get-ChildItem "output_zip/${{ env.ISO_NAME }}.zip.0*" -File | Sort-Object Name
          if (-not $localParts) { throw "No local split parts found in output_zip" }

          $partsLines = @()
          foreach ($p in $localParts) {
            $sha = (Get-FileHash -Algorithm SHA256 $p.FullName).Hash.ToLowerInvariant()
            $downloadUrl = "https://github.com/$owner/$repo/releases/download/$tag/$($p.Name)"
            $partsLines += $downloadUrl
            $partsLines += "  checksum=sha-256=$sha"
            $partsLines += "  out=$($p.Name)"
          }

          $utils = Join-Path $ws "Utils"

          function New-BAT {
            param([string]$destDir, [string[]]$PartsLines)
            $emitParts = @()
            foreach ($ln in $PartsLines) { $emitParts += '  echo(' + $ln }
            $lines = @(
              '@echo off',
              'setlocal ENABLEDELAYEDEXPANSION',
              '',
              'set "OutputDir=%~1"',
              'if not defined OutputDir set "OutputDir=."',
              '',
              'set "HERE=%~dp0"',
              'set "TMPDIR=%TEMP%\uup_parts_%RANDOM%%RANDOM%"',
              'mkdir "%TMPDIR%" >nul 2>&1',
              'set "LIST=%TMPDIR%\parts.txt"',
              'set "ARIA=%HERE%bin\aria2c.exe"',
              'set "SEVENZIP=%HERE%bin\7za.exe"',
              '',
              'if not exist "%ARIA%"  (echo ERROR: missing bin\aria2c.exe & exit /b 1)',
              'if not exist "%SEVENZIP%" (echo ERROR: missing bin\7za.exe & exit /b 1)',
              '',
              'rem Write embedded parts',
              '( '
            ) + $emitParts + @(
              ') > "%TMPDIR%\parts.txt"',
              '',
              'echo Starting download parts with Aria2',
              'echo.',
              '"%ARIA%" --input-file="%LIST%" --dir="%OutputDir%" --auto-file-renaming=false --allow-overwrite=true --continue=true --max-concurrent-downloads=16 --split=16 --min-split-size=1M --check-integrity=true --console-log-level=warn --summary-interval=30 --file-allocation=none',
              'if errorlevel 1 (echo ERROR: aria2 download failed & exit /b 1)',
              '',
              'for /f "delims=" %%P in (''dir /b /a:-d "%OutputDir%\*.zip.001" 2^>nul'') do set "FIRST=%%P"',
              'if not defined FIRST (echo ERROR: No *.zip.001 found & exit /b 1)',
              '',
              'echo Extracting ISO con 7z',
              'echo.',
              '"%SEVENZIP%" x "%OutputDir%\%FIRST%" -o"%OutputDir%" -y -bsp1 -bso0',
              '',
              'for /f "delims=" %%I in (''dir /b /a:-d "%OutputDir%\*.ISO" 2^>nul'') do set "ISO=%%I"',
              'if not defined ISO (echo ERROR: ISO not found & exit /b 1)',
              '',
              'echo ISO saved: %ISO%',
              'echo.',
              'echo Done',
              'echo.',
              'pause',
              'exit /b 0'
            )
            $path = Join-Path $destDir 'get-with-aria2.cmd'
            Set-Content -Path $path -Value ($lines -join "`r`n") -Encoding ASCII
          }

          function New-SH {
            param([string]$destDir, [string[]]$PartsLines)
            $lines = @(
              '#!/bin/sh',
              'set -eu',
              '',
              'SCRIPT_DIR=$(cd "$(dirname "$0")" && pwd)',
              'LAUNCH_DIR=$(pwd)',
              'TMPDIR="$LAUNCH_DIR/tmp_dir"',
              'LIST_FILE="$TMPDIR/parts.txt"',
              'ARIA2_BIN="$SCRIPT_DIR/bin/aria2c"',
              'ARIA2="$ARIA2_BIN"',
              'SEVEN_ZIP=""',
              'mkdir -p "$TMPDIR"',
              'find "$SCRIPT_DIR/bin/" -type f -exec chmod +x {} \;',
              '',
              'for c in "$SCRIPT_DIR/bin/7zzs" "$SCRIPT_DIR/bin/7z" "$SCRIPT_DIR/bin/7za" "$SCRIPT_DIR/bin/7zz"; do',
              '  if [ -x "$c" ] && "$c" i >/dev/null 2>&1; then SEVEN_ZIP="$c"; break; fi',
              'done',
              '',
              'if [ -x "$ARIA2" ] && "$ARIA2" --version >/dev/null 2>&1; then',
              '  :',
              'else',
              '  if command -v aria2c >/dev/null 2>&1; then',
              '    ARIA2=$(command -v aria2c)',
              '    echo "Using system aria2c from: $ARIA2"',
              '  else',
              '    echo "ERROR: aria2c binary not available" >&2',
              '    exit 1',
              '  fi',
              'fi',
              '',
              'cat > "$LIST_FILE" << "EOF_PARTS"'
            ) + ($PartsLines -join "`n") + @(
              'EOF_PARTS',
              '',
              'echo "Starting download of parts with aria2c"',
              '"$ARIA2" --input-file="$LIST_FILE" --dir="$TMPDIR" --auto-file-renaming=false --allow-overwrite=true --continue=true --max-concurrent-downloads=16 --split=16 --min-split-size=1M --check-integrity=true --console-log-level=warn --summary-interval=30 --file-allocation=none',
              '',
              'firstpart=""',
              'for f in "$TMPDIR"/*.zip.001; do',
              '  if [ -f "$f" ]; then firstpart="$f"; break; fi',
              'done',
              '[ -n "$firstpart" ] || { echo "ERROR: No *.zip.001 found" >&2; exit 1; }',
              '',
              'if [ -n "$SEVEN_ZIP" ]; then',
              '  echo "Extracting ISO with 7z"',
              '  "$SEVEN_ZIP" x "$firstpart" -o"$TMPDIR" -y -bsp1 -bso0',
              'else',
              '  echo "7z binary unavailable; combining parts and extracting with unzip"',
              '  command -v unzip >/dev/null 2>&1 || { echo "ERROR: unzip not available for fallback" >&2; exit 1; }',
              '  combined_zip="$TMPDIR/combined.zip"',
              '  rm -f "$combined_zip"',
              '  part_prefix="${firstpart%???}"',
              '  parts_found=0',
              '  for part in "${part_prefix}"???; do',
              '    [ -f "$part" ] || continue',
              '    cat "$part" >> "$combined_zip"',
              '    parts_found=$((parts_found + 1))',
              '  done',
              '  [ "$parts_found" -gt 0 ] || { echo "ERROR: No zip parts found for fallback extraction" >&2; exit 1; }',
              '  unzip -o "$combined_zip" -d "$TMPDIR" >/dev/null',
              'fi',
              '',
              'iso=""',
              'for f in "$TMPDIR"/*.ISO "$TMPDIR"/*.iso; do',
              '  if [ -f "$f" ]; then iso="$f"; break; fi',
              'done',
              '[ -n "$iso" ] || { echo "ERROR: ISO not found" >&2; exit 1; }',
              '',
              'dest="$LAUNCH_DIR/$(basename "$iso")"',
              'mv -f "$iso" "$dest"',
              'echo "ISO saved to: $(basename "$dest")"',
              '',
              'rm -rf "$TMPDIR"',
              '',
              'exit 0'
            )
            $path = Join-Path $destDir 'get-with-aria2.sh'
            $body = ($lines -join "`n")
            $body = $body -replace "`r",""
            $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
            [System.IO.File]::WriteAllText($path, $body, $utf8NoBom)
          }

          function Copy-Platform {
            param([string]$platform,[string]$arch,[string]$zipName)
            $pkgDir = Join-Path $dist ("pkg-" + $platform + "-" + $arch)
            $binDir = Join-Path $pkgDir "bin"
            New-Item -ItemType Directory -Force -Path $binDir | Out-Null

            switch ("$platform-$arch") {
              'windows-x64' {
                Copy-Item (Join-Path $utils 'aria2/windows-x64/aria2c.exe') $binDir -Force
                Copy-Item (Join-Path $utils '7z/windows-x64/7za.exe')       $binDir -Force
                New-BAT -destDir $pkgDir -PartsLines $partsLines
              }
              'windows-arm64' {
                Copy-Item (Join-Path $utils 'aria2/windows-arm64/aria2c.exe') $binDir -Force
                Copy-Item (Join-Path $utils '7z/windows-arm64/7za.exe')       $binDir -Force
                New-BAT -destDir $pkgDir -PartsLines $partsLines
              }
              'linux-x64' {
                Get-ChildItem (Join-Path $utils 'aria2/linux-x64') -Filter 'aria2c*' -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike '*.exe' } | Copy-Item -Destination $binDir -Force
                Get-ChildItem (Join-Path $utils '7z/linux-x64')    -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike '*.exe' } | Copy-Item -Destination $binDir -Force
                & bash -lc "chmod +x '$binDir/*' 2>/dev/null || true"
                New-SH -destDir $pkgDir -PartsLines $partsLines
              }
              'linux-arm' {
                Get-ChildItem (Join-Path $utils 'aria2/linux-arm') -Filter 'aria2c*' -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike '*.exe' } | Copy-Item -Destination $binDir -Force
                Get-ChildItem (Join-Path $utils '7z/linux-arm')    -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike '*.exe' } | Copy-Item -Destination $binDir -Force
                & bash -lc "chmod +x '$binDir/*' 2>/dev/null || true"
                New-SH -destDir $pkgDir -PartsLines $partsLines
              }
              'linux-arm64' {
                Get-ChildItem (Join-Path $utils 'aria2/linux-arm64') -Filter 'aria2c*' -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike '*.exe' } | Copy-Item -Destination $binDir -Force
                Get-ChildItem (Join-Path $utils '7z/linux-arm64')    -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike '*.exe' } | Copy-Item -Destination $binDir -Force
                & bash -lc "chmod +x '$binDir/*' 2>/dev/null || true"
                New-SH -destDir $pkgDir -PartsLines $partsLines
              }
              'macos-universal' {
                Get-ChildItem (Join-Path $utils 'aria2/macos-universal') -Filter 'aria2c*' -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike '*.exe' } | Copy-Item -Destination $binDir -Force
                Get-ChildItem (Join-Path $utils '7z/macos-universal')    -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike '*.exe' } | Copy-Item -Destination $binDir -Force
                & bash -lc "chmod +x '$binDir/*' 2>/dev/null || true"
                New-SH -destDir $pkgDir -PartsLines $partsLines
              }
            }

            $zipPath = Join-Path $dist $zipName
            if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
            Compress-Archive -Path (Join-Path $pkgDir '*') -DestinationPath $zipPath -Force
          }

          Copy-Platform -platform 'windows' -arch 'x64'       -zipName 'isoautodl-windows-x64.zip'
          Copy-Platform -platform 'windows' -arch 'arm64'     -zipName 'isoautodl-windows-arm64.zip'
          Copy-Platform -platform 'linux'   -arch 'x64'       -zipName 'isoautodl-linux-x64.zip'
          Copy-Platform -platform 'linux'   -arch 'arm'       -zipName 'isoautodl-linux-arm.zip'
          Copy-Platform -platform 'linux'   -arch 'arm64'     -zipName 'isoautodl-linux-arm64.zip'
          Copy-Platform -platform 'macos'   -arch 'universal' -zipName 'isoautodl-macos-universal.zip'

      - name: Upload platform ZIPs to Release
        if: ${{ success() }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = "${{ env.RELEASE_TAG }}"
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          $files = @(
            "isoautodl-windows-x64.zip",
            "isoautodl-windows-arm64.zip",
            "isoautodl-linux-x64.zip",
            "isoautodl-linux-arm.zip",
            "isoautodl-linux-arm64.zip",
            "isoautodl-macos-universal.zip"
          ) | ForEach-Object { Join-Path $dist $_ }
          foreach ($f in $files) {
            if (-not (Test-Path $f)) { throw "ZIP not found: $f" }
            gh release upload $tag "$f" --clobber
          }
